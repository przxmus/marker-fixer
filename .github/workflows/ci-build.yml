name: CI Quick Check

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  changes:
    runs-on: ubuntu-latest
    outputs:
      build_needed: ${{ steps.evaluate.outputs.build_needed }}
      reason: ${{ steps.evaluate.outputs.reason }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - id: shas
        shell: bash
        run: |
          if [[ "${{ github.event_name }}" == "pull_request" ]]; then
            echo "base_sha=${{ github.event.pull_request.base.sha }}" >> "$GITHUB_OUTPUT"
            echo "head_sha=${{ github.event.pull_request.head.sha }}" >> "$GITHUB_OUTPUT"
          else
            echo "base_sha=${{ github.event.before }}" >> "$GITHUB_OUTPUT"
            echo "head_sha=${{ github.sha }}" >> "$GITHUB_OUTPUT"
          fi

      - id: evaluate
        shell: bash
        run: |
          scripts/ci/evaluate_changes.sh "${{ steps.shas.outputs.base_sha }}" "${{ steps.shas.outputs.head_sha }}"

  quick-check:
    needs: changes
    if: needs.changes.outputs.build_needed == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          shared-key: marker-fixer-rust-cache-v1
          cache-on-failure: true

      - name: Run tests
        run: cargo test

      - name: Quick native release build smoke test
        run: cargo build --release

  skipped:
    needs: changes
    if: needs.changes.outputs.build_needed != 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Build skipped
        run: |
          echo "Skipping tests/build: ${{ needs.changes.outputs.reason }}"
