name: Manual Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (example: 1.2.3)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
      tag: ${{ steps.meta.outputs.tag }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2

      - name: Validate and bump version
        run: scripts/release/bump_version.sh "${{ github.event.inputs.version }}"

      - name: Commit bump
        shell: bash
        run: |
          if ! git diff --quiet; then
            git add Cargo.toml Cargo.lock
            git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" \
              commit -m "chore(release): v${{ github.event.inputs.version }}"
            git push origin "${{ github.ref_name }}"
          fi

      - id: meta
        shell: bash
        run: |
          echo "version=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          echo "tag=v${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"

      - name: Create and push tag
        shell: bash
        run: |
          TAG="v${{ github.event.inputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG" >&2
            exit 1
          fi
          git tag "$TAG"
          git push origin "$TAG"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            targets: x86_64-unknown-linux-musl,x86_64-pc-windows-gnu
            artifact_name: marker-fixer-release-ubuntu
          - os: macos-latest
            targets: aarch64-apple-darwin,x86_64-apple-darwin
            artifact_name: marker-fixer-release-macos
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ needs.prepare.outputs.tag }}

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: Setup Zig (for cross builds)
        if: runner.os == 'Linux'
        uses: mlugg/setup-zig@v2

      - name: Build release packages
        run: ./build.sh --version "${{ needs.prepare.outputs.version }}" --targets "${{ matrix.targets }}" --clean

      - name: Upload release artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact_name }}
          path: build/*.zip
          if-no-files-found: error

  draft-release:
    needs: [prepare, build]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-artifacts

      - name: Build checksum file
        shell: bash
        run: |
          cd release-artifacts
          if command -v shasum >/dev/null 2>&1; then
            find . -type f -name '*.zip' -print0 | sort -z | xargs -0 shasum -a 256 > SHA256SUMS.txt
          else
            find . -type f -name '*.zip' -print0 | sort -z | xargs -0 sha256sum > SHA256SUMS.txt
          fi

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          TAG="${{ needs.prepare.outputs.tag }}"
          mapfile -d '' ASSETS < <(find release-artifacts -type f -name '*.zip' -print0 | sort -z)
          ASSETS+=("release-artifacts/SHA256SUMS.txt")

          gh release create "$TAG" \
            --draft \
            --title "marker-fixer $TAG" \
            --notes "Draft release for $TAG.\n\nIncludes cross-platform binaries. Runtime FFmpeg/ffprobe is auto-downloaded when missing." \
            "${ASSETS[@]}"
