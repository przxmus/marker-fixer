name: Release (Manual)

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Release version (example: 1.2.3)"
        required: true
        type: string
  push:
    branches:
      - master
    paths:
      - .github/workflows/release.yml

permissions:
  contents: write

jobs:
  register:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - run: echo "Release workflow registration check completed."

  release:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Setup Zig
        uses: mlugg/setup-zig@v2

      - name: Validate and bump version
        run: scripts/release/bump_version.sh "${{ inputs.version }}"

      - name: Commit version bump
        shell: bash
        run: |
          if ! git diff --quiet; then
            git add Cargo.toml Cargo.lock
            git -c user.name="github-actions[bot]" -c user.email="github-actions[bot]@users.noreply.github.com" \
              commit -m "chore(release): v${{ inputs.version }}"
            git push origin "${{ github.ref_name }}"
          fi

      - name: Create and push tag
        shell: bash
        run: |
          TAG="v${{ inputs.version }}"
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "Tag already exists: $TAG" >&2
            exit 1
          fi
          git tag "$TAG"
          git push origin "$TAG"

      - name: Build all release artifacts
        run: ./build.sh --version "${{ inputs.version }}" --clean

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ inputs.version }}
          name: marker-fixer v${{ inputs.version }}
          draft: true
          generate_release_notes: true
          files: |
            build/*.zip
            build/sha256sums.txt
